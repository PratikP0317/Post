services:
  ovtrack:
    build:
      context: .
      dockerfile: Dockerfile.jetson
      args:
        BASE_IMAGE: ${JETSON_PYTORCH_IMAGE:-nvcr.io/nvidia/pytorch:25.08-py3}
    runtime: nvidia
    ipc: host
    network_mode: host
    volumes:
      - ./data:/data
      - ./outputs:/outputs
      - ${HOME}/.cache/huggingface:/models/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
